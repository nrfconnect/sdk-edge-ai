# BLE and MDS (Memfault Diagnostic Service) – chunks sent over BLE to gateway
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Memfault_POC"
CONFIG_BT_PRIVACY=y
CONFIG_BT_MDS=y
# URI = "https://chunks-nrf.memfault.com/api/v0/chunks/" + device_serial; default 64 is too small
CONFIG_BT_MDS_MAX_URI_LENGTH=96

CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# Memfault: use BLE MDS transport (no HTTP on this SoC)
CONFIG_MEMFAULT=y
CONFIG_MEMFAULT_CDR_ENABLE=y

# Set your project key in this file or via overlay (e.g. overlay-secret.conf)
CONFIG_MEMFAULT_NCS_PROJECT_KEY="T7XaQENWlwfOnoGGQ3LeRxGrQjyal5tD"
CONFIG_MEMFAULT_NCS_DEVICE_ID_STATIC=y
CONFIG_MEMFAULT_NCS_DEVICE_ID="memfault-poc-nrf54lm20"

# Optional: bonding for MDS (recommended for production)
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

CONFIG_HEAP_MEM_POOL_SIZE=256
