# Model-only OTA overlay for the multi_model sample (nRF54LM20 DK boards only): Neuton models
# and the person-detection and okay_nordic Axon models are built as linked partition images; wakeword stays
# baked into the app. Build with:
#   west build -b nrf54lm20dk/nrf54lm20b/cpuapp -- -DEXTRA_CONF_FILE=overlay-ota.conf

CONFIG_MODEL_OTA=y
CONFIG_MODEL_OTA_NEUTON=y
CONFIG_MODEL_OTA_AXON=y

# model_image_load_neuton() dependencies.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_CRC=y
