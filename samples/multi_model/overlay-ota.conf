# Model-only OTA overlay for the multi_model sample (nRF54LM20 DK boards only): the Neuton
# models, the person-detection/okay_nordic Axon models, and the wakeword/classification/
# regression Edge AI Lab solutions' compiled Axon models are all built as linked partition
# images. Build with:
#   west build -b nrf54lm20dk/nrf54lm20b/cpuapp -- -DEXTRA_CONF_FILE=overlay-ota.conf

CONFIG_MODEL_OTA=y
CONFIG_MODEL_OTA_NEUTON=y
CONFIG_MODEL_OTA_AXON=y

# model_image_load_neuton() dependencies.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_CRC=y
