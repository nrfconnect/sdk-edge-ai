CONFIG_NCS_SAMPLES_DEFAULTS=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_PRINTK=n
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_DEFERRED=y

# Bluetooth - peripheral with MDS GATT service
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF Edge AI Observability"
CONFIG_BT_PRIVACY=y
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_MDS=y
# Full URI is "https://chunks-nrf.memfault.com/api/v0/chunks/<device-id>";
# the 46-char base plus our device serial overflows the 64-byte default.
CONFIG_BT_MDS_MAX_URI_LENGTH=96

# Settings backend: nRF54LM20 stores in RRAM and does not auto-select a
# backend, so explicitly pick ZMS - otherwise every CCC/key write returns
# -ENOENT and bonds do not persist across reboots.
CONFIG_ZMS=y

# Memfault core + CDR + NCS glue (project key left empty; set it before flashing)
CONFIG_MEMFAULT=y
CONFIG_MEMFAULT_CDR_ENABLE=y
CONFIG_MEMFAULT_NCS_PROJECT_KEY="T7XaQENWlwfOnoGGQ3LeRxGrQjyal5tD"
CONFIG_MEMFAULT_NCS_DEVICE_ID_STATIC=y
CONFIG_MEMFAULT_NCS_DEVICE_ID="model-obsv-dev-nrf54lm20"
# MDS pulls via BLE GATT; HTTP transport must be off (enforced by BT_MDS too).
CONFIG_MEMFAULT_HTTP_ENABLE=n

# nRF Edge AI Observability library - 4 classes, both metrics
CONFIG_NRF_EDGEAI_OBSV=y
CONFIG_NRF_EDGEAI_OBSV_MAX_CLASSES=4
CONFIG_NRF_EDGEAI_OBSV_METRIC_PROBS_DISTRIBUTION=y
CONFIG_NRF_EDGEAI_OBSV_PROBS_DISTRIBUTION_BIN_NUM=4
CONFIG_NRF_EDGEAI_OBSV_METRIC_TRANSITION_MATRIX=y

# Memfault CDR transport for the observability library, with 60 s auto-collect.
# The Memfault packetizer is invoked by MDS over the BLE GATT link, so the
# drain cadence is phone-driven; we just refresh the CDR snapshot once a minute.
CONFIG_ZCBOR=y
CONFIG_NRF_EDGEAI_OBSV_ENCODE=y
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT=y
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT_MAX_CONTEXTS=2
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT_AUTO_COLLECT=y
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT_AUTO_COLLECT_INTERVAL_SEC=60
# Debug-level logging prints a hexdump of each staged CDR snapshot on UART,
# and reports every has_cdr / read_data / mark_read drain event. Keep this
# during bring-up; lower to LOG_LEVEL_INF for a quieter deployment.
CONFIG_NRF_EDGEAI_OBSV_MEMFAULT_LOG_LEVEL_DBG=y
