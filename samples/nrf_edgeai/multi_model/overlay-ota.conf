# Model-only OTA overlay for the multi_model sample (nRF54LM20 DK boards only): each Neuton model
# is built as a self-contained, linked partition IMAGE (the Axon "compiled-into-partition-image"
# flow) placed at its model_storage partition base, and loaded at runtime via the image loader
# (direct model pointer in the partition header) instead of being compiled into the app. Each
# image is a separate, independently-flashable artifact - it is NOT merged into zephyr.hex.
# Build with:
#   west build -b nrf54lm20dk/nrf54lm20b/cpuapp -- -DEXTRA_CONF_FILE=overlay-ota.conf

CONFIG_MODEL_OTA=y
CONFIG_MODEL_OTA_NEUTON=y

# model_image_load_neuton() dependencies.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_CRC=y
