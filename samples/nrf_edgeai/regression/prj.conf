# nRF Edge AI
CONFIG_NRF_EDGEAI=y
# nRF Edge AI dependencies
CONFIG_FPU=y

# Model-only OTA update: by default (CONFIG_NRF_EDGEAI_REGRESSION_MODEL_OTA=y, see Kconfig)
# this sample loads the model from the model_storage flash partition instead of linking it
# into the application image. FLASH/FLASH_MAP/CRC/MODEL_OTA/MODEL_OTA_* are selected by that
# option together with the NRF_EDGEAI_REGRESSION_MODEL backend choice.

CONFIG_NCS_SAMPLES_DEFAULTS=y
