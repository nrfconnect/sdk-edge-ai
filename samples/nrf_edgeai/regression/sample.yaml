sample:
  description: >
    Sample showing nRF Edge AI regression model usage and results interpretation, with the
    model itself loaded at runtime from a dedicated model_storage flash partition (model-only
    OTA update PoC), independently of the application image.
  name: nRF Edge AI Regression Sample
tests:
  sample.edgeai_regression:
    sysbuild: true
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "nRF Edge AI runtime version: 2.2.0"
        # Twister builds and boots a fresh device with an unprovisioned model_storage
        # partition, so it only ever exercises the "no valid model" degraded path here.
        # See README.rst for how to provision model_storage and see real predictions.
        - "No valid model in model_storage"
    platform_allow:
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20a/cpuapp
      - nrf54lm20dk/nrf54lm20b/cpuapp
    timeout: 30
    tags:
      - nrf_edgeai_sample_regression
