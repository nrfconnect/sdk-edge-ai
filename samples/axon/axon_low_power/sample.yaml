sample:
  description: Axon low-power validation workload for power measurement.
  name: nRF Axon Low Power sample
tests:
  sample.axon_low_power.default:
    sysbuild: true
    build_only: true
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  sample.axon_low_power.gpio_trace:
    sysbuild: true
    build_only: true
    extra_args:
      - FILE_SUFFIX=gpio_trace
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  sample.axon_low_power.debug:
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "Model: okay_nordic"
        - "\\d+ captured frames -> \\d+ sliding windows"
        - "Axon NPU platform and model ready"
        - "Quantization params:"
        - "Quantized \\d+ input windows \\(CHW layout\\)"
        - "Running \\d+-window sweep \\(iteration 0\\)"
        - "Sleeping \\d+ ms"
    sysbuild: true
    extra_args:
      - FILE_SUFFIX=debug
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
