CONFIG_NCS_SAMPLES_DEFAULTS=y

CONFIG_NRF_AXON=y

# set size of interlayer buffer to fit largest model
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=17

# set size of psum buffer to fit largest model
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

# Place nrf_axon_interlayer_buffer in the fixed-address memory region reserved in the board
# overlay (instead of plain .bss), so its address is identical in every build - required for
# model_ota's Axon loader to trust cmd_buffer's embedded references to it. See the overlay for
# why, and lib/model_ota/model_pkg_axon.c for the on-device check that would otherwise be the
# only thing catching a mismatch.
CONFIG_NRF_AXON_INTERLAYER_BUFFER_MEMREGION_NAME="AXON_INTERLAYER"

# Allow floating point in printf
CONFIG_PICOLIBC_IO_FLOAT=y

# Model-only OTA update: by default (CONFIG_HELLO_AXON_MODEL_OTA=y, see Kconfig) this sample
# loads, validates, and runs inference against an Axon model package read from the
# model_storage flash partition at boot instead of shipping a compiled-in model - see main.c
# and README.rst. FLASH/FLASH_MAP/CRC/MODEL_OTA/MODEL_OTA_AXON are selected by that option.
