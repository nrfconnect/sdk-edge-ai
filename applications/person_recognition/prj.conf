CONFIG_GPIO=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_NRF_AXON=y
CONFIG_NRF_AXON_MODEL_NAME="mcunet_vww_320kb"

# Must be > NRF_AXON_MODEL_MCUNET_VWW_320KB_MAX_IL_BUFFER_USED (146892 in current header).
# Oversizing wastes RAM in .bss and can overflow SRAM; keep this tight.
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=147456
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

CONFIG_MAIN_STACK_SIZE=8192

CONFIG_SPI=y
CONFIG_VIDEO=y
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=65536
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=4

CONFIG_HEAP_MEM_POOL_SIZE=4096
