sample:
  description: Matter Switch application
  name: Matter Switch

common:
  sysbuild: true
  build_only: true
  tags:
    - ci_build
    - sysbuild

tests:
  applications.matter_ambient_sensing.snoring_dmic_adafruit:
    extra_args:
      - CONFIG_AMBIENT_SENSING_MODEL_SNORING=y
      - EXTRA_DTC_OVERLAY_FILE=boards/dmic_adafruit.dtsi
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
