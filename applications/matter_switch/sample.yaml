sample:
  description: Wakeword and Keyword Spotting application
  name: ww kws

common:
  sysbuild: true
  build_only: true
  tags:
    - ci_build
    - sysbuild
    - ci_applications_ww_kws
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "Initialization completed"


tests:
  applications.matter_switch.generic_switch_debug:
    extra_args:
      - CONFIG_GENERIC_SWITCH=y
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  applications.matter_switch.light_switch_debug:
    extra_args:
      - CONFIG_LIGHT_SWITCH=y
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  applications.matter_switch.generic_switch_release:
    extra_args:
      - FILE_SUFFIX=release
      - CONFIG_GENERIC_SWITCH=y
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  applications.matter_switch.light_switch_release:
    extra_args:
      - FILE_SUFFIX=release
      - CONFIG_LIGHT_SWITCH=y
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
