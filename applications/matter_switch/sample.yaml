sample:
  description: Matter Switch application
  name: Matter Switch

common:
  sysbuild: true
  build_only: true
  tags:
    - ci_build
    - sysbuild

tests:
  applications.matter_switch.generic_switch_debug_dmic_adafruit:
    extra_args:
      - CONFIG_GENERIC_SWITCH=y
      - EXTRA_DTC_OVERLAY_FILE=boards/dmic_adafruit.dtsi
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  applications.matter_switch.generic_switch_debug_dmic_low_power:
    extra_args:
      - CONFIG_GENERIC_SWITCH=y
      - EXTRA_DTC_OVERLAY_FILE=boards/dmic_low_power.dtsi
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  applications.matter_switch.light_switch_debug_dmic_adafruit:
    extra_args:
      - CONFIG_LIGHT_SWITCH=y
      - EXTRA_DTC_OVERLAY_FILE=boards/dmic_adafruit.dtsi
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
  applications.matter_switch.light_switch_debug_dmic_low_power:
    extra_args:
      - CONFIG_LIGHT_SWITCH=y
      - EXTRA_DTC_OVERLAY_FILE=boards/dmic_low_power.dtsi
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
