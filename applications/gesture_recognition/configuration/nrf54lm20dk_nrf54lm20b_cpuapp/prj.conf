# nRF Edge AI
CONFIG_NRF_EDGEAI=y
# nRF Edge AI dependencies
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# nRF Axon
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=512

# Enable sensor, button and LED libraries
CONFIG_PWM=y
CONFIG_SPI=y
CONFIG_SENSOR=y

# BMI270 FIFO streaming (100 Hz ODR, 33-sample watermark, INT1)
CONFIG_BMI270=y
CONFIG_BMI270_STREAM=y
CONFIG_BMI270_TRIGGER_OWN_THREAD=y
CONFIG_BMI270_THREAD_STACK_SIZE=5120
CONFIG_BMI270_FIFO_WATERMARK_SAMPLES=33
CONFIG_BMI270_FIFO_STREAM_BLOCK_SIZE=640
CONFIG_BMI270_LOW_POWER_MODE=y

# Sensor async/stream API (required for RTIO streaming)
CONFIG_SENSOR_ASYNC_API=y
CONFIG_RTIO_CONSUME_SEM=y

# System workqueue: FIFO handler does SPI I/O; default 1024 is too small
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048

# IMU FIFO batch mode in app
CONFIG_IMU_FIFO_BATCH=y

# Enable logging and assert
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_ASSERT=y

# Bluetooth configuration
CONFIG_BT=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_SMP=y
CONFIG_BT_L2CAP_TX_BUF_COUNT=5
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF Edge AI Remote Control"
CONFIG_BT_DEVICE_APPEARANCE=961

CONFIG_BT_GATT_UUID16_POOL_SIZE=40
CONFIG_BT_GATT_CHRC_POOL_SIZE=20

CONFIG_BT_CONN_CTX=y

CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="NordicSemiconductor"
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x1915
CONFIG_BT_DIS_PNP_PID=0xEEEF
CONFIG_BT_DIS_PNP_VER=0x0100

CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

# Enable MCUmgr, MCUmgr handlers, and dependencies
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y

CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y

CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y

# Enable the Bluetooth MCUmgr transport (unauthenticated)
CONFIG_MCUMGR_TRANSPORT_BT=y
CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y
