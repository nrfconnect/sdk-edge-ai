# Use no-BLE mode
CONFIG_BLE_MODE_NONE=y

# nRF Edge AI
CONFIG_NRF_EDGEAI=y
# nRF Edge AI dependencies
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# Enable sensor, button and LED libraries
CONFIG_PWM=y
CONFIG_SPI=y
CONFIG_SENSOR=y

# Power management
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# Disable LED pulsing effect to save energy
CONFIG_LED_NOTIFICATION_BLINK=y

# Enable logging
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Compiler/linker optimizations
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_LTO=y
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y

# BMI270 FIFO streaming (100 Hz ODR, 33-sample watermark, INT1 + poll fallback)
CONFIG_BMI270=y
CONFIG_BMI270_STREAM=y
CONFIG_BMI270_TRIGGER_OWN_THREAD=y
CONFIG_BMI270_THREAD_STACK_SIZE=5120
CONFIG_BMI270_FIFO_HEADERLESS=y
CONFIG_BMI270_FIFO_WATERMARK_SAMPLES=33
CONFIG_BMI270_FIFO_STREAM_BLOCK_SIZE=640

CONFIG_BMI270_LOW_POWER_MODE=y
CONFIG_BMI270_FIFO_POLL_FALLBACK=y

# Sensor async/stream API (required for RTIO streaming)
CONFIG_SENSOR_ASYNC_API=y
CONFIG_RTIO_CONSUME_SEM=y

# System workqueue: FIFO handler does SPI I/O; default 1024 is too small
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048

# IMU FIFO batch mode in app
CONFIG_IMU_FIFO_BATCH=y
