sample:
  description: Wakeword and Keyword Spotting application
  name: ww kws

common:
  sysbuild: true
  build_only: true
  tags:
    - ci_build
    - sysbuild
    - ci_applications_ww_kws
  harness: console
  harness_config:
    type: multi_line
    regex:
      - "Initialization completed"


tests:
  applications.ww_kws.zdebug:
    platform_allow:
      - nrf54lm20dk/nrf54lm20b/cpuapp
    integration_platforms:
      - nrf54lm20dk/nrf54lm20b/cpuapp
