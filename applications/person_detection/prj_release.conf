CONFIG_GPIO=y
CONFIG_PRINTK=y
CONFIG_LOG=y
# Immediate logging causes stack overflow in USB DWC2/CDC ACM threads — use deferred.
# CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_NRF_AXON=y
CONFIG_NRF_AXON_MODEL_NAME="person_det"

# Must be >= NRF_AXON_MODEL_PERSON_DET_MAX_IL_BUFFER_USED (225280 in current header).
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=229376
CONFIG_NRF_AXON_PSUM_BUFFER_SIZE=0

CONFIG_SCORE_THRESHOLD=250
CONFIG_IOU_THRESHOLD=450

CONFIG_SPI=y
CONFIG_VIDEO=y
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=2200
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=4

CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=16384

# USB CDC ACM streaming
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_USBD_CDC_ACM_WORKQUEUE=y
CONFIG_USBD_CDC_ACM_STACK_SIZE=4096
CONFIG_UDC_DWC2_STACK_SIZE=4096
CONFIG_RING_BUFFER_LARGE=y
CONFIG_CRC=y
CONFIG_SAMPLE_USBD_PID=0x000A
CONFIG_SAMPLE_USBD_PRODUCT="Person Detection Stream"

# Debug
# CONFIG_THREAD_NAME=y

# CONFIG_DEBUG_THREAD_INFO=y
# CONFIG_THREAD_ANALYZER=y
# CONFIG_DEBUG_OPTIMIZATIONS=y

# CONFIG_NRF_CPU_LOAD=y
# CONFIG_NRF_CPU_LOAD_LOG_PERIODIC=y

CONFIG_NCS_BOOT_BANNER=n
CONFIG_BOOT_BANNER=n
CONFIG_LOG=n
CONFIG_PRINTK=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
